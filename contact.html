<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
<link rel="shortcut icon" href="edm-icon.png">
<link rel="icon" href="edm-icon.png">
<title>EDM System: contact developer</title>
<meta name="description" content="Contact EDM Project author.">
</head>
<body><div class="shadowbox">
  <div class="block top">
    <div class="menu">
      <a class="menuitem" href="/">About</a>
      <a class="menuitem" href="download.html">Download</a>
      <a class="menuitem" href="screens.html">Screenshots</a>
      <a class="menuitem" href="demo.html">Live demo</a>
      <a class="menuitem" href="contact.html">Contact</a>
      <a class="menuitem" href="manual.html">User Docs</a>
      <a class="menuitem" href="manual-admin.html">Admin Docs</a>
    </div>
    <h1>EDM System: contact developer</h1>
    <p>Current version: 1.4.0</p>
  </div>

  <div class="block main">
    <p>You can submit your feedback, bug report, or other question here.</p>
    <br>
    
    <div id="sender">
      <strong>Feedback form</strong>

      <div class="floatwrapper">
      <input class="textinput" type="text" id="name" name="name" size="32" required>
      <label for="name" class="floatlabel">Your name:</label>
      </div>

      <div class="floatwrapper">
      <input class="textinput" type="text" id="email" name="email" size="32" required>
      <label for="email" class="floatlabel">Your email:</label>
      </div>
      
      <div class="floatwrapper">
      <textarea class="textinput multiline" id="feedback" name="feedback" rows="10" cols="32" maxlength="2000" required></textarea>
      <label for="feedback" class="floatlabel">Your message:</label>
      </div>

      <button class="button" id="send" type="button">Submit</button>
    </div>

    <div id="processor" class="processor">
      <div class="loadingCircle"></div>
      <div class="loadingMessage">Sending</div>
    </div>

  </div>

  <div class="block bottom">© 2022 EDM Project</div>
  </div>
</body>
<script>
'use strict'

function appendTempDiv(parentDiv, divClasses, textNodeText) {
  const newDiv =  document.createElement("div");
  newDiv.classList.add(...divClasses);
  newDiv.appendChild(document.createTextNode(textNodeText));
  parentDiv.appendChild(newDiv);
  setTimeout(()=> newDiv.remove(), 8000);
}
function appendDiv(parentDiv, divClasses, textNodeText) {
  const newDiv =  document.createElement("div");
  newDiv.classList.add(...divClasses);
  newDiv.appendChild(document.createTextNode(textNodeText));
  parentDiv.appendChild(newDiv);
}

document.getElementById('send').addEventListener("click", function() {
  const mainDiv = document.querySelector('.block.main');
  const senderDiv = document.getElementById('sender');
  const processorDiv = document.getElementById('processor');
  const name = document.getElementById('name');
  const email = document.getElementById('email');
  const feedback = document.getElementById('feedback');
  let arr = [name, email, feedback];
  for (let elem of arr) {
    if (elem.value == '') {
      elem.style.borderColor = '#f62';
      appendTempDiv(senderDiv, ["red", "disappear"], "Some fields are empty.");
      return;
    }
  }
  if (!/.+@.+/.exec(email.value)) {
    email.style.borderColor = '#f62';
    appendTempDiv(senderDiv, ["red", "disappear"], "Wrong email typed in.");
    return;
  };
  const URL = 'https://feedback.funct.workers.dev/'
  const data = {
    "subject": "EDM System Feedback",
    "name": document.getElementById('name').value,
    "email": document.getElementById('email').value,
    "feedback": document.getElementById('feedback').value
    .replace(/\{/g, "&#123;").replace(/\}/g, "&#125;")
  };
  senderDiv.style.display = 'none';
  processorDiv.style.display = 'block';
  arr.map(elem => elem.value = '');
  arr.map(elem => elem.style.borderColor = 'revert-layer');

  fetch(URL, {
    method: "POST", body: JSON.stringify(data),
    headers: {"Content-type": "application/json; charset=UTF-8"}
  }).catch(error => console.log(error))
  .then(res => {
    if (res && res.ok) {return res.json();}
    else {return {status: 601}}
  }).then(json => {
    processorDiv.style.display = 'none';
    //senderDiv.style.display = 'block';
    if (json.status == 0) {
      appendDiv(mainDiv, ["green"], "SUCCESS: The message was sent.");
    } else {
      appendDiv(mainDiv, ["red"], "SORRY: ERROR sending the message.");
    }
  }).catch((error) => {
    processorDiv.style.display = 'none';
    //senderDiv.style.display = 'block';
    appendDiv(mainDiv, ["red"], "SORRY: ERROR sending the message.");
    console.log(error);
  });
});

</script>
</html>
